{# templates/components/empty_state.html #}
{# Beklenen context: icon (lucide name), title (str), description (str), cta_label (str|None), cta_href (str|None) #}
<div class="empty-state" data-component="empty-state">
  <div class="empty-state-icon">
    <i data-lucide="{{ icon | default('package') }}" style="width:48px;height:48px;"></i>
  </div>
  <h3 class="empty-state-title">{{ title }}</h3>
  <p class="empty-state-desc">{{ description }}</p>
  {% if cta_label and cta_href %}
    <a href="{{ cta_href }}" class="btn-primary">{{ cta_label }}</a>
  {% endif %}
</div>
