{# Cmd+K palette — JS tarafı static/js/cmdk.js #}
<div class="cmdk-modal" data-component="command-palette" hidden>
  <div class="cmdk-backdrop" data-cmdk-backdrop></div>
  <div class="cmdk-panel" role="dialog" aria-label="Komut paleti">
    <input type="text" class="cmdk-search" placeholder="Bir şeyler ara veya komut yaz..." data-cmdk-search aria-label="Komut paleti araması" autocomplete="off"/>
    <div class="cmdk-results" data-cmdk-results role="listbox"></div>
    <div class="cmdk-footer">
      <span><kbd>↑↓</kbd> gez</span>
      <span><kbd>↵</kbd> seç</span>
      <span><kbd>Esc</kbd> kapat</span>
    </div>
  </div>
</div>
