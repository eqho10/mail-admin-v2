{# templates/components/mailbox_reset_password_modal.html — Faz 4a Task 14 #}
<dialog id="mailbox-reset-password-modal" class="modal-dialog" data-component="mailbox-reset-password-modal">
  <form method="POST" action="/mailboxes/reset-password" class="modal-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="domain" value="">
    <input type="hidden" name="user" value="">
    <header class="modal-header">
      <h2>Şifre Sıfırla</h2>
      <button type="button" class="modal-close" onclick="this.closest('dialog').close()" aria-label="Kapat">×</button>
    </header>
    <div class="modal-body">
      <fieldset class="modal-radio-group">
        <legend>Mod</legend>
        <label>
          <input type="radio" name="mode" value="generate" checked>
          <span>Otomatik üret</span>
        </label>
        <label>
          <input type="radio" name="mode" value="manual">
          <span>Manuel gir</span>
        </label>
      </fieldset>
      <label>
        <span>Yeni şifre (manuel mod)</span>
        <input name="password" type="password" minlength="8" autocomplete="new-password">
      </label>
      <label>
        <span>Şifre (tekrar)</span>
        <input name="password_confirm" type="password" minlength="8" autocomplete="new-password">
      </label>
      <label>
        <span>Yeni şifreyi gönder (email)</span>
        <input name="send_to" type="email" placeholder="opsiyonel">
      </label>
    </div>
    <footer class="modal-footer">
      <button type="button" onclick="this.closest('dialog').close()">İptal</button>
      <button type="submit" class="btn-primary">Sıfırla</button>
    </footer>
  </form>
</dialog>
